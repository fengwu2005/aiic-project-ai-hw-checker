<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CoCode Viva</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">CV</span>
        <span>
          <strong>CoCode Viva</strong>
          <small>编程作业掌握度答辩系统</small>
        </span>
      </a>
      <nav class="nav">
        {% if user %}
        {% if user.role == "student" %}
        <a class="{{ 'active' if page == 'student' else '' }}" href="/student">学生端</a>
        <a class="{{ 'active' if page == 'assignment' else '' }}" href="/assignment">题目要求</a>
        {% else %}
        <a class="{{ 'active' if page == 'teacher' else '' }}" href="/teacher">教师端</a>
        <a class="{{ 'active' if page == 'assignment' else '' }}" href="/assignment">题目要求</a>
        {% if session and session.id %}
        <a class="{{ 'active' if page == 'debug' else '' }}" href="/teacher/debug/{{ session.id }}">后台证据</a>
        {% endif %}
        {% endif %}
        <form method="post" action="/logout"><button type="submit">退出</button></form>
        {% else %}
        <a class="{{ 'active' if page == 'assignment' else '' }}" href="/assignment">题目要求</a>
        <a class="{{ 'active' if page == 'login' else '' }}" href="/login">登录/注册</a>
        {% endif %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
